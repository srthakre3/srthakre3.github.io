<svg viewBox="0 0 900 350" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif" role="img">
  <title>Self-Serve Analytics Platform Architecture</title>
  <desc>Raw e-commerce data flows through Redshift raw layer, dbt staging, intermediate, and dimensional mart, into a governed metric layer, and finally into QuickSight and Tableau dashboards.</desc>
  <rect width="900" height="350" fill="#F8FAFC" rx="12"/>
  <text x="450" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#0F172A">Self-Serve Analytics Platform</text>
  <text x="450" y="48" text-anchor="middle" font-size="10" fill="#64748B">SQL · dbt · Amazon Redshift · QuickSight / Tableau</text>
  <text x="22" y="76" font-size="9" font-weight="700" fill="#94A3B8" letter-spacing="1.2">DATA FLOW</text>
  <rect x="20" y="84" width="130" height="75" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="85" y="107" text-anchor="middle" font-size="11" font-weight="700" fill="#1D4ED8">Source</text>
  <text x="85" y="121" text-anchor="middle" font-size="9" fill="#2563EB">Orders</text>
  <text x="85" y="133" text-anchor="middle" font-size="9" fill="#2563EB">Customers</text>
  <text x="85" y="145" text-anchor="middle" font-size="9" fill="#2563EB">Products</text>
  <text x="85" y="155" text-anchor="middle" font-size="8" fill="#60A5FA">(raw e-commerce data)</text>
  <line x1="150" y1="121" x2="172" y2="121" stroke="#CBD5E1" stroke-width="1.5"/>
  <polygon points="172,117 180,121 172,125" fill="#CBD5E1"/>
  <rect x="180" y="84" width="120" height="75" rx="8" fill="#FEF9C3" stroke="#CA8A04" stroke-width="1.5"/>
  <text x="240" y="107" text-anchor="middle" font-size="11" font-weight="700" fill="#92400E">Raw Layer</text>
  <text x="240" y="121" text-anchor="middle" font-size="9" fill="#B45309">Amazon Redshift</text>
  <text x="240" y="135" text-anchor="middle" font-size="9" fill="#B45309">raw schema</text>
  <text x="240" y="149" text-anchor="middle" font-size="9" fill="#B45309">No transformations</text>
  <line x1="300" y1="121" x2="322" y2="121" stroke="#CBD5E1" stroke-width="1.5"/>
  <polygon points="322,117 330,121 322,125" fill="#CBD5E1"/>
  <rect x="330" y="74" width="295" height="95" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="477" y="90" text-anchor="middle" font-size="9" font-weight="700" fill="#7C3AED" letter-spacing="0.8">dbt TRANSFORMATIONS</text>
  <rect x="340" y="97" width="82" height="62" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1"/>
  <text x="381" y="115" text-anchor="middle" font-size="10" font-weight="600" fill="#6D28D9">Staging</text>
  <text x="381" y="128" text-anchor="middle" font-size="8" fill="#7C3AED">stg_orders</text>
  <text x="381" y="139" text-anchor="middle" font-size="8" fill="#7C3AED">stg_customers</text>
  <text x="381" y="150" text-anchor="middle" font-size="8" fill="#7C3AED">stg_products</text>
  <line x1="422" y1="128" x2="436" y2="128" stroke="#8B5CF6" stroke-width="1.2"/>
  <polygon points="436,125 442,128 436,131" fill="#8B5CF6"/>
  <rect x="442" y="97" width="82" height="62" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1"/>
  <text x="483" y="115" text-anchor="middle" font-size="10" font-weight="600" fill="#6D28D9">Intermediate</text>
  <text x="483" y="128" text-anchor="middle" font-size="8" fill="#7C3AED">int_order_items</text>
  <text x="483" y="139" text-anchor="middle" font-size="8" fill="#7C3AED">int_customer</text>
  <text x="483" y="150" text-anchor="middle" font-size="8" fill="#7C3AED">_metrics</text>
  <line x1="524" y1="128" x2="538" y2="128" stroke="#8B5CF6" stroke-width="1.2"/>
  <polygon points="538,125 544,128 538,131" fill="#8B5CF6"/>
  <rect x="544" y="97" width="72" height="62" rx="6" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1"/>
  <text x="580" y="115" text-anchor="middle" font-size="10" font-weight="600" fill="#6D28D9">Mart</text>
  <text x="580" y="128" text-anchor="middle" font-size="8" fill="#7C3AED">fact_orders</text>
  <text x="580" y="139" text-anchor="middle" font-size="8" fill="#7C3AED">dim_customers</text>
  <text x="580" y="150" text-anchor="middle" font-size="8" fill="#7C3AED">dim_products</text>
  <line x1="625" y1="121" x2="647" y2="121" stroke="#CBD5E1" stroke-width="1.5"/>
  <polygon points="647,117 655,121 647,125" fill="#CBD5E1"/>
  <rect x="655" y="84" width="115" height="75" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="713" y="106" text-anchor="middle" font-size="11" font-weight="700" fill="#065F46">Metric Layer</text>
  <text x="713" y="120" text-anchor="middle" font-size="9" fill="#059669">Revenue KPIs</text>
  <text x="713" y="132" text-anchor="middle" font-size="9" fill="#059669">Churn Rate</text>
  <text x="713" y="144" text-anchor="middle" font-size="9" fill="#059669">Cohort Retention</text>
  <text x="713" y="155" text-anchor="middle" font-size="8" fill="#6EE7B7">(governed definitions)</text>
  <line x1="770" y1="121" x2="792" y2="121" stroke="#CBD5E1" stroke-width="1.5"/>
  <polygon points="792,117 800,121 792,125" fill="#CBD5E1"/>
  <rect x="800" y="84" width="80" height="75" rx="8" fill="#FDF4FF" stroke="#A21CAF" stroke-width="1.5"/>
  <text x="840" y="107" text-anchor="middle" font-size="10" font-weight="700" fill="#86198F">Dashboard</text>
  <text x="840" y="121" text-anchor="middle" font-size="9" fill="#A21CAF">QuickSight</text>
  <text x="840" y="133" text-anchor="middle" font-size="9" fill="#A21CAF">Tableau</text>
  <text x="840" y="147" text-anchor="middle" font-size="8" fill="#C084FC">Self-serve access</text>
  <text x="22" y="190" font-size="9" font-weight="700" fill="#94A3B8" letter-spacing="1.2">DIMENSIONAL MODEL (STAR SCHEMA)</text>
  <rect x="20" y="198" width="860" height="85" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.2"/>
  <rect x="385" y="210" width="130" height="62" rx="8" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="450" y="230" text-anchor="middle" font-size="11" font-weight="700" fill="#6D28D9">fact_orders</text>
  <text x="450" y="244" text-anchor="middle" font-size="8" fill="#7C3AED">order_id · customer_id</text>
  <text x="450" y="255" text-anchor="middle" font-size="8" fill="#7C3AED">product_id · date_id</text>
  <text x="450" y="266" text-anchor="middle" font-size="8" fill="#7C3AED">revenue · quantity</text>
  <rect x="40" y="214" width="120" height="54" rx="6" fill="#F3E8FF" stroke="#9333EA" stroke-width="1"/>
  <text x="100" y="234" text-anchor="middle" font-size="10" font-weight="600" fill="#7E22CE">dim_customers</text>
  <text x="100" y="247" text-anchor="middle" font-size="8" fill="#9333EA">customer_id · segment</text>
  <text x="100" y="258" text-anchor="middle" font-size="8" fill="#9333EA">region · signup_date</text>
  <line x1="160" y1="241" x2="385" y2="241" stroke="#C4B5FD" stroke-width="1" stroke-dasharray="4,2"/>
  <rect x="196" y="214" width="120" height="54" rx="6" fill="#F3E8FF" stroke="#9333EA" stroke-width="1"/>
  <text x="256" y="234" text-anchor="middle" font-size="10" font-weight="600" fill="#7E22CE">dim_products</text>
  <text x="256" y="247" text-anchor="middle" font-size="8" fill="#9333EA">product_id · category</text>
  <text x="256" y="258" text-anchor="middle" font-size="8" fill="#9333EA">brand · price_tier</text>
  <line x1="316" y1="241" x2="385" y2="241" stroke="#C4B5FD" stroke-width="1" stroke-dasharray="4,2"/>
  <rect x="544" y="214" width="120" height="54" rx="6" fill="#F3E8FF" stroke="#9333EA" stroke-width="1"/>
  <text x="604" y="234" text-anchor="middle" font-size="10" font-weight="600" fill="#7E22CE">dim_dates</text>
  <text x="604" y="247" text-anchor="middle" font-size="8" fill="#9333EA">date_id · year · month</text>
  <text x="604" y="258" text-anchor="middle" font-size="8" fill="#9333EA">week · is_weekend</text>
  <line x1="515" y1="241" x2="544" y2="241" stroke="#C4B5FD" stroke-width="1" stroke-dasharray="4,2"/>
  <rect x="740" y="214" width="120" height="54" rx="6" fill="#F3E8FF" stroke="#9333EA" stroke-width="1"/>
  <text x="800" y="234" text-anchor="middle" font-size="10" font-weight="600" fill="#7E22CE">dim_channels</text>
  <text x="800" y="247" text-anchor="middle" font-size="8" fill="#9333EA">channel_id · type</text>
  <text x="800" y="258" text-anchor="middle" font-size="8" fill="#9333EA">source · campaign</text>
  <line x1="740" y1="241" x2="515" y2="241" stroke="#C4B5FD" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="22" y="305" font-size="9" font-weight="700" fill="#94A3B8" letter-spacing="1.2">LEGEND</text>
  <rect x="22" y="313" width="12" height="10" rx="2" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/><text x="38" y="322" font-size="9" fill="#475569">Source</text>
  <rect x="100" y="313" width="12" height="10" rx="2" fill="#FEF9C3" stroke="#CA8A04" stroke-width="1"/><text x="116" y="322" font-size="9" fill="#475569">Raw Storage</text>
  <rect x="215" y="313" width="12" height="10" rx="2" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1"/><text x="231" y="322" font-size="9" fill="#475569">dbt Transform</text>
  <rect x="340" y="313" width="12" height="10" rx="2" fill="#ECFDF5" stroke="#059669" stroke-width="1"/><text x="356" y="322" font-size="9" fill="#475569">Metric Layer</text>
  <rect x="445" y="313" width="12" height="10" rx="2" fill="#FDF4FF" stroke="#A21CAF" stroke-width="1"/><text x="461" y="322" font-size="9" fill="#475569">Dashboard</text>
  <rect x="540" y="313" width="12" height="10" rx="2" fill="#F3E8FF" stroke="#9333EA" stroke-width="1"/><text x="556" y="322" font-size="9" fill="#475569">Dimension Tables</text>
</svg>
